site_name: ASSTF Documentation
site_url: https://safewaretaiwan.github.io/leanai-asstf/
repo_url: https://github.com/SafewareTaiwan/leanai-asstf
repo_name: SafewareTaiwan/leanai-asstf
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue grey
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  logo: assets/logo.svg
  favicon: assets/logo.svg
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Introduction: INTRODUCTION_EN.md
  - Architecture: ARCHITECTURE_EN.md
  - Usage: USAGE_EN.md
  - API Reference: API_EN.md
  - Benchmarks: BENCHMARKS.md
  - Open Source Stages: OPEN_SOURCE_STAGES.md
  - Business Roadmap: BUSINESS_ROADMAP.md
  - Promotion Strategy: PROMOTION_STRATEGY.md
  - Design Review: DESIGN_IMPLEMENTATION_REVIEW.md
  - Stage 1 Impact: STAGE1_IMPACT_ASSESSMENT.md
  - GitHub Placement: GITHUB_PLACEMENT.md
  - Execution Plan: STAGE1_EXECUTION_PLAN.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/SafewareTaiwan/leanai-asstf
  version:
    provider: mike

copyright: Copyright &copy; 2026 Safeware Technologies Inc., Ltd.
