name: Bug Report
description: Report a problem with ASSTF
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below so we can reproduce and fix it.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: When I run ASSTFLinear with structural_rank=0, it raises...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Provide a minimal code snippet that reproduces the issue.
      placeholder: |
        ```python
        import torch
        from asstf import ASSTFLinear
        layer = ASSTFLinear(10, 5)
        ```
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include full error messages if any.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Please provide the following information:
        - OS:
        - Python version:
        - PyTorch version:
        - ASSTF version:
        - Device (CPU/CUDA/MPS):
      placeholder: |
        - OS: macOS 14
        - Python: 3.11
        - PyTorch: 2.1.0
        - ASSTF: 1.0.0
        - Device: MPS
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our [Code of Conduct](../../CODE_OF_CONDUCT.md).
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true
